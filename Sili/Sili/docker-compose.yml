version: '3.9'
services:
  bitacora:
    build: .
    container_name: bitacora_app
    ports:
      - "5000:5000"
    environment:
      - BITACORA_SECRET=bitacora_super_secreto
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
    volumes:
      - ./database:/app/database
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped
