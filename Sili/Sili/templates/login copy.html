<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitácora - Iniciar sesión</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}"> 
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}"> 
  <!-- Bootstrap Icons 
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
-->

  <style>
    /* Full-page gradient background */
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f4c75, #1b262c);
    }

    /* Translucent login card */
    .login-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      color: #f5f5f5;
    }

    .login-card .icon {
      font-size: 4rem;
      color: #ffffff;
    }

    .login-card label {
      color: #e0e0e0;
    }

    .login-card .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid #cccccc;
      border-radius: 0;
      color: #ffffff;
    }

    .login-card .form-control:focus {
      box-shadow: none;
      border-color: #66afe9;
    }

    .login-card .form-control::placeholder {
      color: #b0c4de;
    }

    .login-card .btn-primary {
      width: 100%;
      margin-top: 1rem;
    }

    .login-card a {
      color: #a7d7f2;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="text-center mb-3">
      <i class="bi bi-person-circle icon"></i>
    </div>
    <h4 class="text-center mb-4">Iniciar sesión</h4>
    <form method="POST" action="{{ url_for('login') }}"> <input type="hidden" name="csrf_token"
        value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember" style="color:#e0e0e0;">Recuérdame</label>
        </div>
        <div>
          <a href="{{ url_for('forgot_password') }}">¿Olvidó su contraseña?</a>
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
    {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
  </div>
  <!-- Bootstrap JS Bundle -->
  <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>-->
  <link rel="stylesheet" href="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}">

</body>

</html>
