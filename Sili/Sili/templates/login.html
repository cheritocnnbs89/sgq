<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitácora - Iniciar sesión</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">

  <!-- CSS propio del login -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login/login.css') }}">

  <!-- Bootstrap Icons 
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
-->
</head>

<body>
  <div class="login-card">
    <div class="text-center mb-3">
      <i class="bi bi-person-circle icon"></i>
    </div>
    <h4 class="text-center mb-4">Iniciar sesión</h4>

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label remember-label" for="remember">Recuérdame</label>
        </div>
        <div>
          <a href="{{ url_for('forgot_password') }}">¿Olvidó su contraseña?</a>
        </div>
      </div>

      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

    {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

  <!-- JS propio del login -->
  <script src="{{ url_for('static', filename='js/login/login.js') }}"></script>
</body>

</html>
