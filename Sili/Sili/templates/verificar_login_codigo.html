<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitácora - Verificar inicio de sesión</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">

  <!-- CSS propio -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login/verificar_login_codigo.css') }}">

  <!--
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  -->
</head>

<body>
  <div class="verify-card">
    <div class="text-center mb-3">
      <i class="bi bi-shield-lock-fill icon"></i>
    </div>
    <h4 class="text-center mb-3">Verificación de inicio de sesión</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <p class="text-center mb-3">
      Ingrese el código enviado a su correo.
      <br>
      Intentos restantes: <strong>{{ attempts_left }}</strong>
    </p>

    <form method="POST" action="{{ url_for('verificar_login_codigo') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Código</label>
        <input type="text" name="code" class="form-control" maxlength="6" placeholder="Ingrese el código" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Validar código</button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}">Cancelar</a>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/login/verificar_login_codigo.js') }}"></script>
</body>

</html>
