<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitácora - Verificar inicio de sesión</title>
  <!-- Bootstrap CSS  -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}"> 
    <!--  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">-->

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f4c75, #1b262c);
      color: #f5f5f5;
    }

    .verify-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      color: #f5f5f5;
    }

    .verify-card .icon {
      font-size: 3rem;
      color: #ffffff;
    }

    .verify-card .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid #cccccc;
      border-radius: 0;
      color: #ffffff;
    }

    .verify-card .form-control::placeholder {
      color: #b0c4de;
    }

    .verify-card a {
      color: #a7d7f2;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .verify-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="verify-card">
    <div class="text-center mb-3">
      <i class="bi bi-shield-lock-fill icon"></i>
    </div>
    <h4 class="text-center mb-3">Verificación de inicio de sesión</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <p class="text-center mb-3">
      Ingrese el código enviado a su correo.
      <br>
      Intentos restantes: <strong>{{ attempts_left }}</strong>
    </p>

    <form method="POST" action="{{ url_for('verificar_login_codigo') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Código</label>
        <input type="text" name="code" class="form-control" maxlength="6" placeholder="Ingrese el código" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Validar código</button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}">Cancelar</a>
    </div>
  </div>
</body>

</html>
