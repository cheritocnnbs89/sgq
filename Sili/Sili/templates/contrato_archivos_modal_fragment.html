{% if archivos and archivos|length %}
  <div class="list-group">
    {% for a in archivos %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div class="me-2">
          <div class="fw-semibold">
            <i class="bi bi-file-earmark-pdf me-1"></i>
            {{ a.original_name or a.filename }}
          </div>
          <div class="text-muted small">Subido: {{ a.uploaded_at or '' }}</div>
        </div>

        <div class="btn-group btn-group-sm">
          <a class="btn btn-outline-primary"
             target="_blank"
             href="{{ url_for('contratos.ver_archivo_contrato', archivo_id=a.id) }}">
            <i class="bi bi-eye"></i> Ver
          </a>

          {% if can_exportar %}
          <a class="btn btn-outline-secondary"
             href="{{ url_for('contratos.descargar_archivo_contrato', archivo_id=a.id) }}">
            <i class="bi bi-download"></i> Descargar
          </a>
          {% endif %}
        </div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="alert alert-light border mb-0">No hay adjuntos.</div>
{% endif %}
